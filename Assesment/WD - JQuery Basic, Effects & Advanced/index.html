<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body{
            background:#f2f2f2;
        }

        .container{
            width:700px;
            margin:80px auto;
            background:#f4a6ad;
            padding:60px;
            text-align:center;
        }

        h1{
            color:green;
        }

        .redText{
            color:red;
            font-weight:bold;
        }

        .greenText{
            color:green;
            font-weight:bold;
        }

        select{
            margin-top:20px;
            padding:5px;
        }
    </style>
</head>
<body>
    <div class="container">

    <h1>Example</h1>

    <p class="redText">Get Selected Value in drop-down using jquery</p>

    <p class="greenText">Select Country from drop-down list:</p>

    <select id="country">
        <option value="">Select</option>
        <option>India</option>
        <option>USA</option>
        <option>UK</option>
        <option>Canada</option>
        </select>

    </div>

    <script src="script.js"></script>

</body>
</html>
